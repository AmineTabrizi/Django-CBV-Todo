{% extends 'base.html' %}
{% load static %}

{% block title %}Todo Dashboard{% endblock %}

{% block content %}

<style>
    body {
        background: radial-gradient(circle at 20% 20%, #1e293b, #0f172a 60%);
        min-height: 100vh;
    }

    .todo-card {
        backdrop-filter: blur(20px);
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 24px;
        padding: 40px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    .todo-title {
        font-weight: 700;
        letter-spacing: -1px;
        color: #fff;
    }

    .todo-input {
        background: rgba(255,255,255,0.08);
        border: none;
        color: #fff;
        border-radius: 14px;
        padding: 12px 18px;
    }

    .todo-input:focus {
        box-shadow: 0 0 0 2px #6366f1;
        background: rgba(255,255,255,0.12);
        color: #fff;
    }

    .btn-add {
        background: #6366f1;
        border: none;
        border-radius: 14px;
        padding: 10px 20px;
        font-weight: 600;
    }

    .task-item {
        background: rgba(255,255,255,0.05);
        border-radius: 16px;
        padding: 12px 18px;
        margin-bottom: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: 0.2s ease;
    }

    .task-item:hover {
        background: rgba(255,255,255,0.1);
        transform: translateY(-2px);
    }

    
    .task-complete {
        text-decoration: line-through;
        opacity: 0.5;
    }

    .delete-btn {
        color: #ef4444;
        font-size: 18px;
        text-decoration: none;
    }

    .edit-btn {
        color: #38bdf8;
        font-size: 18px;
        text-decoration: none;
    }
</style>

<div class="container d-flex justify-content-center align-items-center" style="min-height:100vh;">
    <div class="col-md-6">

        <div class="todo-card">

            <h2 class="todo-title mb-4">Your Tasks</h2>

            <!-- Create Task -->
            <form method="POST" action="{% url 'create_task' %}" class="mb-4">
                {% csrf_token %}
                <div class="d-flex gap-2">
                    <input type="text" name="title" class="form-control todo-input"
                        placeholder="What needs to be done?">
                    <button type="submit" class="btn btn-add">Add</button>
                </div>
            </form>

            <!-- Task List -->
            {% for task in Tasks %}
                <div class="task-item">

                    
                    <span class="{% if task.status %}task-complete{% endif %}">
                        {{ task.title }}
                    </span>

                    <!-- Buttons -->
                    <div class="d-flex gap-3 align-items-center">

                        <a href="{% url 'update_task' task.id %}" class="edit-btn">
                            <i class="bi bi-pencil-square"></i>
                        </a>

                        <a href="{% url 'delete_task' task.id %}" class="delete-btn">
                            <i class="bi bi-trash"></i>
                        </a>

                    </div>

                </div>
            {% empty %}
                <p class="text-light opacity-50">No tasks yet. Add your first one 🚀</p>
            {% endfor %}

        </div>
    </div>
</div>

{% endblock %}
