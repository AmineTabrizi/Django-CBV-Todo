{% extends 'base.html' %}

{% block title %}Update Task{% endblock %}

{% block content %}

<style>
    body {
        background: radial-gradient(circle at 20% 20%, #0f172a, #020617 70%);
        min-height: 100vh;
    }

    .update-wrapper {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .update-card {
        width: 460px;
        padding: 50px 45px;
        border-radius: 28px;
        background: rgba(255,255,255,0.05);
        backdrop-filter: blur(25px);
        border: 1px solid rgba(255,255,255,0.08);
        box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    }

    .update-title {
        color: #fff;
        font-weight: 600;
        margin-bottom: 25px;
        text-align: center;
    }

    .form-control {
        background: rgba(255,255,255,0.08);
        border: none;
        border-radius: 14px;
        padding: 14px 16px;
        color: #fff;
        margin-bottom: 15px;
    }

    .form-control:focus {
        background: rgba(255,255,255,0.12);
        box-shadow: 0 0 0 2px #6366f1;
        color: #fff;
    }

    .form-check-input {
        background-color: rgba(255,255,255,0.2);
        border: none;
    }

    .form-check-label {
        color: rgba(255,255,255,0.7);
    }

    .btn-update {
        width: 100%;
        padding: 12px;
        border-radius: 14px;
        border: none;
        font-weight: 600;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        transition: 0.3s ease;
        color: white;
        margin-top: 10px;
    }

    .btn-update:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(99,102,241,0.4);
    }

    .btn-cancel {
        display: block;
        text-align: center;
        margin-top: 15px;
        color: rgba(255,255,255,0.6);
        text-decoration: none;
        font-size: 14px;
    }

    .btn-cancel:hover {
        color: #fff;
    }

    .task-preview {
        font-size: 13px;
        color: rgba(255,255,255,0.4);
        margin-bottom: 20px;
        text-align: center;
    }
</style>

<div class="update-wrapper">
    <div class="update-card">

        <h3 class="update-title">Edit Task</h3>

        <div class="task-preview">
            Editing: "{{ Tasks.title }}"
        </div>

        <form method="POST" novalidate>
            {% csrf_token %}

            {# Title #}
            <input type="text"
                   name="{{ form.title.name }}"
                   value="{{ form.title.value|default_if_none:'' }}"
                   class="form-control"
                   placeholder="Task title">

            {# Status #}
            <div class="form-check mb-3">
                <input class="form-check-input"
                       type="checkbox"
                       name="{{ form.status.name }}"
                       id="statusCheck"
                       {% if form.status.value %}checked{% endif %}>
                <label class="form-check-label" for="statusCheck">
                    Mark as completed
                </label>
            </div>

            <button type="submit" class="btn btn-update">
                Save Changes
            </button>
        </form>

        <a href="{% url 'task_list' %}" class="btn-cancel">
            Cancel
        </a>

    </div>
</div>

{% endblock %}
